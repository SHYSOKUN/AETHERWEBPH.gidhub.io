<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aether WebPlayer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root { 
    --accent: #ff0033; 
    --ui-bg: rgba(0, 0, 0, 0.7); 
}

body, html { 
    margin: 0; padding: 0;
    height: 100vh; width: 100vw;
    font-family: 'Inter', sans-serif;
    color: white;
    overflow: hidden;
    background: transparent;
}

/* VIDEO */
#video-container {
    position: fixed; inset: 0;
    z-index: -2;
}

#video-bg {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0.5);
}

/* HEADER */
header { 
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 15px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
}

.search-bar {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    border-radius: 10px;
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    outline: none;
}

/* GRID */
.grid { 
    position: absolute;
    top: 80px;
    bottom: 140px;
    left: 10px;
    right: 10px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    overflow-y: auto;
}

.card {
    border-radius: 10px;
    overflow: hidden;
    background: rgba(0,0,0,0.5);
}

.card img {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
}

.card-info {
    padding: 8px;
    font-size: 13px;
    font-weight: 700;
}

/* FOOTER */
footer {
    position: fixed;
    bottom: 0;
    width: 100%;
    height: 130px;
    background: var(--ui-bg);
    border-top: 2px solid var(--accent);
    display: flex;
    flex-direction: column;
    padding: 10px;
}

/* TRACK */
.track-cell {
    display: flex;
    align-items: center;
    gap: 10px;
}

#track-art {
    width: 50px;
    height: 50px;
}

#track-name {
    font-size: 14px;
}

/* CONTROLS */
.controls {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    margin-top: 5px;
}

.play-btn {
    width: 55px;
    height: 55px;
    font-size: 22px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
}

.loop-btn {
    font-size: 10px;
}

/* SLIDER */
#scrub {
    width: 100%;
}

/* VOLUME */
.vol-cell {
    display: flex;
    justify-content: center;
    gap: 10px;
    align-items: center;
}
</style>
</head>

<body onclick="forceEngagement()">

<!-- VIDEO BACKGROUND -->
<div id="video-container">
    <video autoplay muted loop playsinline id="video-bg">
        <source src="Akatsuki.mp4" type="video/mp4">
    </video>
</div>

<!-- SEARCH -->
<header>
    <input type="text" class="search-bar" id="searchInp"
    placeholder="Enter Song URL or Name..."
    onkeydown="if(event.key==='Enter') startProcess(this.value)">
</header>

<!-- RESULTS -->
<div class="grid" id="grid"></div>

<!-- PLAYER -->
<footer>

<div class="track-cell">
    <img id="track-art" src="">
    <div id="track-name">Aether Stream</div>
</div>

<div class="controls">
    <button onclick="yt.previousVideo()">⏮</button>
    <button class="play-btn" id="m-play" onclick="togglePlay()">▶</button>
    <button class="loop-btn" id="loop-toggle" onclick="toggleLoop()">LOOP</button>
    <button onclick="yt.nextVideo()">⏭</button>
</div>

<input type="range" id="scrub" value="0" oninput="manualSeek(this.value)">

<div class="vol-cell">
    <span id="v-val">20</span>
    <input type="range" min="0" max="100" value="20" oninput="changeVol(this.value)">
</div>

</footer>

<div id="player" style="position:absolute; top:-9999px;"></div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
let yt, isLooping = false, hasEngaged = false, progressInterval;

// UNLOCK
function forceEngagement() {
    if (!hasEngaged) {
        document.getElementById('video-bg').play().catch(()=>{});
        if (yt) yt.playVideo();
        hasEngaged = true;
    }
}

// YT READY
function onYouTubeIframeAPIReady() {
    yt = new YT.Player('player', {
        height: '0',
        width: '0',
        events: {
            onReady: (e) => e.target.setVolume(20),
            onStateChange: (e) => {
                if (e.data === 1) {
                    document.getElementById('track-name').innerText =
                        yt.getVideoData().title;

                    document.getElementById('m-play').innerText = '⏸';
                    startProgress();

                } else if (e.data === 0) {
                    isLooping ? yt.playVideo() : yt.nextVideo();
                } else {
                    document.getElementById('m-play').innerText = '▶';
                }
            }
        }
    });
}

// PROGRESS
function startProgress() {
    clearInterval(progressInterval);
    progressInterval = setInterval(() => {
        if (!yt) return;
        document.getElementById('scrub').max = yt.getDuration();
        document.getElementById('scrub').value = yt.getCurrentTime();
    }, 500);
}

// START
function startProcess(val) {
    if (!val || !yt) return;

    const id = extractId(val);
    if (id) {
        yt.loadVideoById(id);
        setThumb(id);
    } else {
        runSearch(val);
    }

    document.getElementById('searchInp').value = '';
}

// ID
function extractId(url) {
    const match = url.match(/(?:v=|youtu\.be\/)([^&]+)/);
    return match ? match[1] : null;
}

// THUMB
function setThumb(id) {
    document.getElementById('track-art').src =
        `https://img.youtube.com/vi/${id}/mqdefault.jpg`;
}

// SEARCH
async function runSearch(q) {
    try {
        const r = await fetch(`https://pipedapi.kavin.rocks/search?q=${q}`);
        const d = await r.json();

        const g = document.getElementById('grid');
        g.innerHTML = '';

        d.items.slice(0,10).forEach(i => {
            const id = extractId(i.url);
            if (!id) return;

            const div = document.createElement('div');
            div.className = 'card';

            div.onclick = () => {
                yt.loadVideoById(id);
                setThumb(id);
            };

            div.innerHTML = `
                <img src="${i.thumbnail}">
                <div class="card-info">${i.title}</div>
            `;

            g.appendChild(div);
        });

    } catch(e) {
        console.log("Search failed");
    }
}

// CONTROLS
function togglePlay() {
    yt.getPlayerState() === 1 ? yt.pauseVideo() : yt.playVideo();
}

function toggleLoop() {
    isLooping = !isLooping;
    document.getElementById('loop-toggle').innerText =
        isLooping ? "LOOP ON" : "LOOP";
}

function changeVol(v) {
    yt.setVolume(v);
    document.getElementById('v-val').innerText = v;
}

function manualSeek(v) {
    yt.seekTo(v, true);
}
</script>

</body>
</html>
