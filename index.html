<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aether WEBPLAYER</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --accent: #ff0033; 
            --glass: rgba(0, 0, 0, 0.6); /* Transparenter für Video-Sichtbarkeit */
            --border: rgba(255, 255, 255, 0.15);
        }
        
        body, html { 
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            font-family: 'Inter', sans-serif; color: white;
            overflow: hidden; background: transparent; 
        }

        /* FULLSCREEN VIDEO BACKGROUND */
        #video-container {
            position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%;
            z-index: -1; /* Hinter der UI */
            overflow: hidden;
            background: #000; /* Nur Fallback */
        }

        #video-bg {
            width: 100%; height: 100%;
            object-fit: cover; /* Füllt den Screen komplett aus */
            display: block;
            filter: brightness(0.5); /* Damit man die weiße Schrift noch lesen kann */
        }

        header { 
            height: 70px; display: flex; align-items: center; justify-content: center;
            padding: 10px 15px; z-index: 100; position: relative;
        }

        .search-container {
            display: flex; width: 100%; max-width: 500px; gap: 8px;
            background: var(--glass); padding: 5px; border-radius: 12px;
            border: 1px solid var(--border); backdrop-filter: blur(10px);
        }

        .search-bar {
            flex-grow: 1; background: transparent; border: none;
            padding: 10px; color: white; font-size: 14px; outline: none;
        }

        .add-btn {
            background: var(--accent); color: white; border: none; border-radius: 8px;
            padding: 0 15px; font-weight: 900; cursor: pointer; font-size: 11px;
        }

        .grid { 
            position: absolute; top: 80px; bottom: 210px; left: 0; right: 0;
            padding: 0 15px; display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); 
            gap: 12px; overflow-y: auto; scrollbar-width: none;
        }
        .grid::-webkit-scrollbar { display: none; }
        
        .card { cursor: pointer; border-radius: 10px; overflow: hidden; background: var(--glass); border: 1px solid var(--border); backdrop-filter: blur(5px); }
        .card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .card-info { padding: 8px; font-size: 11px; font-weight: 700; height: 30px; overflow: hidden; text-transform: uppercase; }

        /* FLOATING HUD */
        footer {
            position: fixed; bottom: 15px; left: 10px; right: 10px;
            background: var(--glass); 
            border: 1px solid var(--border); border-radius: 20px;
            display: flex; flex-direction: column; 
            padding: 15px; box-sizing: border-box; backdrop-filter: blur(20px);
            z-index: 200; gap: 10px;
        }

        .track-row { display: flex; align-items: center; gap: 12px; width: 100%; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        #track-art { width: 45px; height: 45px; border-radius: 6px; border: 1px solid var(--accent); object-fit: cover; }
        #track-name { font-size: 13px; font-weight: 900; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-grow: 1; text-transform: uppercase; }

        .controls-main { display: flex; align-items: center; justify-content: space-between; width: 100%; }
        .play-btn { width: 50px; height: 50px; border-radius: 50%; background: #fff; color: #000; border: none; font-size: 20px; display: flex; align-items: center; justify-content: center; }
        .nav-btn { background: none; border: none; color: #ccc; font-weight: 900; font-size: 10px; padding: 10px; }

        .utility-row { display: flex; align-items: center; justify-content: center; gap: 15px; width: 100%; }
        .vol-container { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 20px; }
        .vol-slider { width: 80px; accent-color: var(--accent); height: 4px; }
        #v-val { font-size: 12px; font-weight: 900; color: var(--accent); min-width: 25px; }

        .loop-btn { background: none; border: 1px solid #666; color: #fff; padding: 5px 12px; border-radius: 15px; font-size: 9px; font-weight: 800; }
        .loop-btn.active { border-color: var(--accent); color: var(--accent); }

        #scrub { width: 100%; accent-color: var(--accent); height: 4px; margin-top: 5px; }

        @media (min-width: 768px) {
            footer { bottom: 0; left: 0; right: 0; border-radius: 0; height: 110px; display: grid; grid-template-columns: 300px 1fr 300px; }
            .track-row { border: none; padding: 0; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); bottom: 130px; }
        }
    </style>
</head>
<body onclick="forceEngagement()">

    <div id="video-container">
        <video autoplay muted loop playsinline id="video-bg">
            <source src="Akatsuki.mp4" type="video/mp4">
        </video>
    </div>

    <header>
        <div class="search-container">
            <input type="text" class="search-bar" id="searchInp" placeholder="SUCHEN..." onkeydown="if(event.key==='Enter') startProcess(this.value)">
            <button class="add-btn" onclick="startProcess(document.getElementById('searchInp').value)">ADD</button>
        </div>
    </header>

    <div class="grid" id="grid"></div>

    <footer>
        <div class="track-row">
            <img id="track-art" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
            <div id="track-name">READY</div>
        </div>
        <div class="controls-main">
            <button class="nav-btn" onclick="yt.previousVideo()">PREV</button>
            <button class="play-btn" id="m-play" onclick="togglePlay()">▶</button>
            <button class="nav-btn" onclick="yt.nextVideo()">NEXT</button>
        </div>
        <div class="utility-row">
            <div class="vol-container">
                <span id="v-val">50</span>
                <input type="range" class="vol-slider" oninput="changeVol(this.value)" value="50" min="0" max="100">
            </div>
            <button class="loop-btn" id="loop-toggle" onclick="toggleLoop()">LOOP: OFF</button>
        </div>
        <input type="range" id="scrub" value="0" step="1" oninput="manualSeek(this.value)">
    </footer>

    <div id="player" style="position:absolute; top:-1000px;"></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let yt, isLooping = false, hasEngaged = false;

        function forceEngagement() {
            if(!hasEngaged) {
                document.getElementById('video-bg').play();
                if(yt && yt.playVideo) yt.playVideo();
                hasEngaged = true;
            }
        }

        function onYouTubeIframeAPIReady() {
            yt = new YT.Player('player', {
                height: '0', width: '0',
                playerVars: { 'autoplay': 1, 'controls': 0, 'enablejsapi': 1, 'rel': 0 },
                events: { 
                    'onReady': (e) => { e.target.setVolume(50); }, 
                    'onStateChange': (e) => {
                        if(e.data === 1) { 
                            document.getElementById('track-name').innerText = yt.getVideoData().title.toUpperCase();
                            document.getElementById('m-play').innerText = '⏸';
                            updateProgress();
                        } else if (e.data === 0) { 
                            if(isLooping) { yt.playVideo(); } else { yt.nextVideo(); }
                        } else {
                            document.getElementById('m-play').innerText = '▶';
                        }
                    }
                }
            });
        }

        function startProcess(val) {
            if(!val) return;
            const id = extractId(val);
            if(id) {
                yt.loadVideoById(id);
                document.getElementById('track-art').src = `https://img.youtube.com/vi/${id}/mqdefault.jpg`;
            } else {
                runSearch(val);
            }
            document.getElementById('searchInp').value = '';
        }

        function extractId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        async function runSearch(q) {
            const r = await fetch(`https://pipedapi.kavin.rocks/search?q=${encodeURIComponent(q)}&filter=music_songs`);
            const d = await r.json();
            if(d.items && d.items.length > 0) {
                const firstId = d.items[0].url.split('v=')[1];
                yt.loadVideoById(firstId);
                document.getElementById('track-art').src = d.items[0].thumbnail;
                const g = document.getElementById('grid'); g.innerHTML = '';
                d.items.slice(0, 15).forEach(i => {
                    const videoId = i.url.split('v=')[1];
                    const div = document.createElement('div'); div.className = 'card';
                    div.onclick = () => { yt.loadVideoById(videoId); document.getElementById('track-art').src = i.thumbnail; };
                    div.innerHTML = `<img src="${i.thumbnail}"><div class="card-info">${i.title}</div>`;
                    g.appendChild(div);
                });
            }
        }

        function toggleLoop() {
            isLooping = !isLooping;
            const btn = document.getElementById('loop-toggle');
            btn.classList.toggle('active', isLooping);
            btn.innerText = isLooping ? "LOOP: ON" : "LOOP: OFF";
        }

        function togglePlay() { yt.getPlayerState() === 1 ? yt.pauseVideo() : yt.playVideo(); }
        function changeVol(v) { yt.setVolume(v); document.getElementById('v-val').innerText = v; }
        function manualSeek(v) { yt.seekTo(v); }
        
        function updateProgress() {
            setInterval(() => {
                if(yt && yt.getCurrentTime) {
                    const dur = yt.getDuration();
                    if(dur > 0) {
                        document.getElementById('scrub').max = dur;
                        document.getElementById('scrub').value = yt.getCurrentTime();
                    }
                }
            }, 500);
        }
    </script>
</body>
</html>
