<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aether Mobile Fixed Player</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root { --accent:#ff0033; }
body{margin:0;font-family:'Inter',sans-serif;background:black;color:white;overflow:hidden;}
#video-bg{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;filter:brightness(.45);z-index:-1;}
header{padding:10px;display:flex;gap:8px;}
.search{flex:1;padding:14px;font-size:16px;border-radius:12px;border:none;background:rgba(0,0,0,.6);color:white;}
#addBtn{padding:14px 16px;border:none;border-radius:12px;background:var(--accent);color:white;font-weight:bold;font-size:16px;cursor:pointer;}
.grid{position:absolute;top:70px;bottom:170px;left:10px;right:10px;display:grid;grid-template-columns:1fr 1fr;gap:10px;overflow-y:auto;}
.card{border-radius:12px;overflow:hidden;background:rgba(0,0,0,.5);}
.card img{width:100%;aspect-ratio:16/9;object-fit:cover;}
.card-info{padding:8px;font-size:13px;}
footer{position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,.9);backdrop-filter:blur(20px);padding:12px;display:flex;flex-direction:column;gap:10px;padding-bottom:calc(12px + env(safe-area-inset-bottom));}
.track{display:flex;align-items:center;gap:10px;}
#track-art{width:50px;height:50px;border-radius:8px;}
#track-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#seek{width:100%;}
.controls{display:flex;justify-content:space-between;align-items:center;}
.controls button{flex:1;font-size:24px;background:none;border:none;color:white;padding:10px;}
.play{font-size:34px;}
.bottom{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.vol{display:flex;align-items:center;gap:8px;flex:1;}
#v-val{width:35px;text-align:right;color:var(--accent);font-weight:bold;}
#vol{flex:1;}
</style>
</head>
<body>

<video autoplay muted loop playsinline id="video-bg">
<source src="Akatsuki.mp4" type="video/mp4">
</video>

<header>
<input class="search" id="search" placeholder="YouTube URL">
<button id="addBtn">+ ADD</button>
</header>

<div class="grid" id="grid"></div>

<footer>
<div class="track">
<img id="track-art">
<div id="track-name">Aether</div>
</div>
<input id="seek" type="range" value="0">
<div class="controls">
<button onclick="prev()">⏮</button>
<button class="play" id="play">▶</button>
<button onclick="next()">⏭</button>
</div>
<div class="bottom">
<button onclick="loop()">🔁</button>
<div class="vol">
<span id="v-val">20</span>
<input id="vol" type="range" min="0" max="100" value="20">
</div>
</div>
</footer>

<div id="player" style="display:none;"></div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
let yt, ytReady=false, loopOn=false, interval;

// Utility: extract YouTube ID
function extract(url){let m=url.match(/(?:v=|youtu\.be\/)([^&]+)/);return m?m[1]:null;}

// Thumb
function thumb(id){document.getElementById('track-art').src=`https://img.youtube.com/vi/${id}/mqdefault.jpg`;}

// Update progress
function startProgress(){
clearInterval(interval);
interval=setInterval(()=>{
if(!ytReady) return;
seek.max=yt.getDuration();
seek.value=yt.getCurrentTime();
},500);
}

// Toggle Play/Pause
function toggle(){
if(!ytReady) return;
yt.getPlayerState()===1 ? yt.pauseVideo() : yt.playVideo();
}

// Next / Prev / Loop
function next(){if(!ytReady) return; yt.nextVideo();}
function prev(){if(!ytReady) return; yt.previousVideo();}
function loop(){loopOn=!loopOn;}

// Seek bar
seek.oninput=()=>{if(ytReady) yt.seekTo(seek.value,true);}

// Volume
vol.oninput=()=>{
let v=vol.value;
v-val.innerText=v;
if(!ytReady) return;
yt.setVolume(v);
};
vol.onchange=()=>{if(ytReady) yt.setVolume(vol.value);}

// Add Button
document.getElementById('addBtn').onclick = function(){
let url=document.getElementById('search').value.trim();
let id=extract(url);
if(!id){alert("Ungültige URL"); return;}
if(!ytReady){alert("Player noch nicht bereit"); return;}

// Play immediately
yt.loadVideoById(id);
thumb(id);
document.getElementById('search').value='';

// Add to grid
let c=document.createElement('div');
c.className='card';
c.onclick=()=>{yt.loadVideoById(id); thumb(id);};
c.innerHTML=`<img src="https://img.youtube.com/vi/${id}/mqdefault.jpg"><div class="card-info">${url}</div>`;
grid.prepend(c);
}

// YouTube IFrame API
function onYouTubeIframeAPIReady(){
yt = new YT.Player('player',{
height:'0',width:'0',
playerVars:{'autoplay':0,'controls':0,'rel':0,'modestbranding':1},
events:{
'onReady':()=>{
ytReady=true; yt.setVolume(20);
},
'onStateChange':(e)=>{
if(e.data==1){document.getElementById('track-name').innerText=yt.getVideoData().title; document.getElementById('play').innerText='⏸'; startProgress();}
else{document.getElementById('play').innerText='▶';}
if(e.data==0){loopOn?yt.playVideo():yt.nextVideo();}
}
}
});
}

// Unlock video for mobile autoplay
document.body.addEventListener('click',()=>{document.getElementById('video-bg').play().catch(()=>{});});
</script>
</body>
</html>
