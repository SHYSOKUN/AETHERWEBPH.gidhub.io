<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aether WEBPLAYER</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --accent: #ff0033; 
            --glass: rgba(0, 0, 0, 0.7);
            --border: rgba(255, 255, 255, 0.1);
        }
        
        body, html { 
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            font-family: 'Inter', sans-serif; color: white;
            overflow: hidden; background-color: #000; 
        }

        #video-container {
            position: fixed; inset: 0; width: 100vw; height: 100vh;
            z-index: -2; overflow: hidden;
        }

        #video-bg {
            min-width: 100%; min-height: 100%; width: auto; height: auto;
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            object-fit: cover;
            filter: brightness(0.4);
        }

        /* MODERN HEADER */
        header { 
            height: 70px; display: flex; align-items: center; justify-content: center;
            padding: 10px 15px; z-index: 100; position: relative;
        }

        .search-container {
            display: flex; width: 100%; max-width: 500px; gap: 8px;
            background: var(--glass); padding: 6px; border-radius: 15px;
            border: 1px solid var(--border); backdrop-filter: blur(10px);
        }

        .search-bar {
            flex-grow: 1; background: transparent; border: none;
            padding: 10px; color: white; font-size: 15px; outline: none;
        }

        .add-btn {
            background: var(--accent); color: white; border: none; border-radius: 10px;
            padding: 0 15px; font-weight: 800; cursor: pointer; font-size: 12px;
        }

        /* GRID: MEHR PLATZ NACH UNTEN */
        .grid { 
            position: absolute; top: 85px; bottom: 140px; left: 0; right: 0;
            padding: 0 15px; display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 12px; overflow-y: auto; scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        
        .card { cursor: pointer; border-radius: 12px; overflow: hidden; background: var(--glass); border: 1px solid var(--border); transition: 0.2s; }
        .card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .card-info { padding: 8px; font-size: 11px; font-weight: 700; height: 32px; overflow: hidden; }

        /* MODERN FLOATING HUD (MOBILE FIRST) */
        footer {
            position: fixed; bottom: 15px; left: 15px; right: 15px;
            height: auto; background: var(--glass); 
            border: 1px solid var(--border); border-radius: 20px;
            display: flex; flex-direction: column; 
            padding: 12px; box-sizing: border-box; backdrop-filter: blur(25px);
            z-index: 200; gap: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* DESKTOP RESTORE */
        @media (min-width: 768px) {
            footer { 
                bottom: 0; left: 0; right: 0; border-radius: 0; 
                flex-direction: row; height: 100px; padding: 0 30px;
                display: grid; grid-template-columns: 250px 1fr 250px;
            }
            .grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); bottom: 110px; }
            .vol-cell { display: flex !important; }
        }

        .track-cell { display: flex; align-items: center; gap: 10px; }
        #track-art { width: 40px; height: 40px; border-radius: 8px; border: 1px solid var(--accent); object-fit: cover; }
        #track-name { font-size: 13px; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-grow: 1; }

        .player-cell { display: flex; flex-direction: column; align-items: center; width: 100%; gap: 5px; }
        .controls-row { display: flex; gap: 25px; align-items: center; }
        
        .play-btn { width: 45px; height: 45px; border-radius: 50%; background: #fff; color: #000; border: none; font-size: 18px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px rgba(255,255,255,0.2); }
        .nav-btn { background: none; border: none; color: #bbb; font-weight: 900; font-size: 10px; padding: 10px; }

        #scrub { width: 100%; accent-color: var(--accent); height: 4px; border-radius: 2px; }

        .loop-btn { background: none; border: 1px solid #444; color: #888; padding: 3px 8px; border-radius: 10px; font-size: 9px; font-weight: 800; margin-top: 2px; }
        .loop-btn.active { border-color: var(--accent); color: var(--accent); }

        .vol-cell { display: none; justify-content: flex-end; align-items: center; gap: 10px; }
        #v-val { font-weight: 900; color: var(--accent); font-size: 16px; width: 30px; }
    </style>
</head>
<body onclick="forceEngagement()">

    <div id="video-container">
        <video autoplay muted loop playsinline id="video-bg">
            <source src="Akatsuki.mp4" type="video/mp4">
        </video>
    </div>

    <header>
        <div class="search-container">
            <input type="text" class="search-bar" id="searchInp" placeholder="Song/URL..." onkeydown="if(event.key==='Enter') startProcess(this.value)">
            <button class="add-btn" onclick="startProcess(document.getElementById('searchInp').value)">ADD</button>
        </div>
    </header>

    <div class="grid" id="grid"></div>

    <footer>
        <div class="track-cell">
            <img id="track-art" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
            <div id="track-name">Aether Player</div>
        </div>

        <div class="player-cell">
            <input type="range" id="scrub" value="0" step="1" oninput="manualSeek(this.value)">
            <div class="controls-row">
                <button class="nav-btn" onclick="yt.previousVideo()">PREV</button>
                <button class="play-btn" id="m-play" onclick="togglePlay()">▶</button>
                <button class="nav-btn" onclick="yt.nextVideo()">NEXT</button>
            </div>
            <button class="loop-btn" id="loop-toggle" onclick="toggleLoop()">LOOP: OFF</button>
        </div>

        <div class="vol-cell">
            <span id="v-val">50</span>
            <input type="range" oninput="changeVol(this.value)" value="50" min="0" max="100" style="accent-color:var(--accent); width: 70px;">
        </div>
    </footer>

    <div id="player" style="position:absolute; top:-1000px;"></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let yt, isLooping = false, hasEngaged = false;

        function forceEngagement() {
            if(!hasEngaged) {
                const vid = document.getElementById('video-bg');
                vid.play().catch(e => console.log("Video wait..."));
                if(yt && yt.playVideo) yt.playVideo();
                hasEngaged = true;
            }
        }

        function onYouTubeIframeAPIReady() {
            yt = new YT.Player('player', {
                height: '0', width: '0',
                playerVars: { 'autoplay': 1, 'controls': 0, 'enablejsapi': 1, 'rel': 0, 'origin': window.location.origin },
                events: { 
                    'onReady': (e) => { e.target.setVolume(50); }, 
                    'onStateChange': (e) => {
                        if(e.data === 1) { 
                            document.getElementById('track-name').innerText = yt.getVideoData().title.toUpperCase();
                            document.getElementById('m-play').innerText = '⏸';
                            updateProgress();
                        } else if (e.data === 0) { 
                            if(isLooping) { yt.playVideo(); } else { yt.nextVideo(); }
                        } else {
                            document.getElementById('m-play').innerText = '▶';
                        }
                    }
                }
            });
        }

        function startProcess(val) {
            if(!val) return;
            const id = extractId(val);
            if(id) {
                yt.loadVideoById(id);
                document.getElementById('track-art').src = `https://img.youtube.com/vi/${id}/mqdefault.jpg`;
            } else {
                runSearch(val);
            }
            document.getElementById('searchInp').value = '';
        }

        function extractId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        async function runSearch(q) {
            const r = await fetch(`https://pipedapi.kavin.rocks/search?q=${encodeURIComponent(q)}&filter=music_songs`);
            const d = await r.json();
            if(d.items && d.items.length > 0) {
                const firstId = d.items[0].url.split('v=')[1];
                yt.loadVideoById(firstId);
                document.getElementById('track-art').src = d.items[0].thumbnail;
                
                const g = document.getElementById('grid'); g.innerHTML = '';
                d.items.slice(0, 15).forEach(i => {
                    const videoId = i.url.split('v=')[1];
                    const div = document.createElement('div'); div.className = 'card';
                    div.onclick = () => { 
                        yt.loadVideoById(videoId); 
                        document.getElementById('track-art').src = i.thumbnail; 
                    };
                    div.innerHTML = `<img src="${i.thumbnail}"><div class="card-info">${i.title}</div>`;
                    g.appendChild(div);
                });
            }
        }

        function toggleLoop() {
            isLooping = !isLooping;
            const btn = document.getElementById('loop-toggle');
            btn.classList.toggle('active', isLooping);
            btn.innerText = isLooping ? "LOOP: ON" : "LOOP: OFF";
        }

        function togglePlay() { yt.getPlayerState() === 1 ? yt.pauseVideo() : yt.playVideo(); }
        function changeVol(v) { yt.setVolume(v); document.getElementById('v-val').innerText = v; }
        function manualSeek(v) { yt.seekTo(v); }
        
        function updateProgress() {
            setInterval(() => {
                if(yt && yt.getCurrentTime) {
                    const dur = yt.getDuration();
                    if(dur > 0) {
                        document.getElementById('scrub').max = dur;
                        document.getElementById('scrub').value = yt.getCurrentTime();
                    }
                }
            }, 500);
        }
    </script>
</body>
</html>
