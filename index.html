<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Player Fix</title>
</head>
<body style="margin:0;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:black;color:white;">

<input id="url" placeholder="YouTube URL" style="width:80%;padding:10px;font-size:16px;margin-bottom:10px;">
<button id="playBtn" style="padding:10px 20px;font-size:16px;margin-bottom:20px;">Play</button>

<div id="player"></div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
let yt;

// YouTube ID extrahieren
function extract(url){
    let m = url.match(/(?:v=|youtu\.be\/)([^&]+)/);
    return m ? m[1] : null;
}

// Play Button
document.getElementById('playBtn').onclick = function(){
    let videoId = extract(document.getElementById('url').value.trim());
    if(!videoId){ alert("Ungültige YouTube URL"); return; }

    if(!yt){
        yt = new YT.Player('player', {
            height: '360',
            width: '640',
            videoId: videoId,
            playerVars: { autoplay: 1, controls: 1 },
            events: {
                'onReady': e => e.target.playVideo()
            }
        });
    } else {
        yt.loadVideoById(videoId);
        yt.playVideo();
    }
};
</script>
</body>
</html>
