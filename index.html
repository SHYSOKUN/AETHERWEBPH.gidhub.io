<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Aether Mobile</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root { --accent:#ff0033; }

* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body{
margin:0;
font-family:'Inter',sans-serif;
color:white;
background:black;
overflow:hidden;
}

/* VIDEO */
#video-bg{
position:fixed;
inset:0;
width:100%;
height:100%;
object-fit:cover;
filter:brightness(.45);
z-index:-1;
}

/* HEADER + SEARCH + ADD BUTTON */
header{
padding:10px;
display:flex;
gap:8px;
}
.search{
flex:1;
padding:14px;
font-size:16px;
border-radius:12px;
border:none;
background:rgba(0,0,0,.6);
color:white;
}
#addBtn{
padding:14px 16px;
border:none;
border-radius:12px;
background:var(--accent);
color:white;
font-weight:bold;
font-size:16px;
cursor:pointer;
flex-shrink:0;
}

/* GRID */
.grid{
position:absolute;
top:70px;
bottom:170px;
left:10px;
right:10px;
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
overflow-y:auto;
}

/* CARD */
.card{
border-radius:12px;
overflow:hidden;
background:rgba(0,0,0,.5);
}
.card img{
width:100%;
aspect-ratio:16/9;
object-fit:cover;
}
.card-info{
padding:8px;
font-size:13px;
}

/* PLAYER */
footer{
position:fixed;
bottom:0;
left:0;
right:0;
background:rgba(0,0,0,.9);
backdrop-filter:blur(20px);
padding:12px;
display:flex;
flex-direction:column;
gap:10px;
padding-bottom:calc(12px + env(safe-area-inset-bottom));
}

/* TRACK */
.track{
display:flex;
align-items:center;
gap:10px;
}
#track-art{
width:50px;
height:50px;
border-radius:8px;
}
#track-name{
font-size:14px;
font-weight:700;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

/* SEEK */
#seek{
width:100%;
}

/* CONTROLS */
.controls{
display:flex;
justify-content:space-between;
align-items:center;
}
.controls button{
flex:1;
font-size:24px;
background:none;
border:none;
color:white;
padding:10px;
}
.play{font-size:34px;}

/* BOTTOM */
.bottom{
display:flex;
align-items:center;
justify-content:space-between;
gap:10px;
}

/* VOLUME */
.vol{
display:flex;
align-items:center;
gap:8px;
flex:1;
}
#v-val{
width:35px;
text-align:right;
color:var(--accent);
font-weight:bold;
}
#vol{
flex:1;
}
</style>
</head>

<body onclick="unlock()">

<video autoplay muted loop playsinline id="video-bg">
<source src="Akatsuki.mp4" type="video/mp4">
</video>

<header>
<input class="search" id="search" placeholder="Search or paste URL">
<button id="addBtn">+ ADD</button>
</header>

<div class="grid" id="grid"></div>

<footer>
<div class="track">
<img id="track-art">
<div id="track-name">Aether</div>
</div>

<input id="seek" type="range" value="0">

<div class="controls">
<button onclick="prev()">⏮</button>
<button class="play" id="play" onclick="toggle()">▶</button>
<button onclick="next()">⏭</button>
</div>

<div class="bottom">
<button onclick="loop()">🔁</button>
<div class="vol">
<span id="v-val">20</span>
<input id="vol" type="range" min="0" max="100" value="20">
</div>
</div>
</footer>

<div id="player" style="display:none;"></div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
let yt, loopOn=false, unlocked=false, interval, volTimer;

// UNLOCK MOBILE PLAY
function unlock(){
if(unlocked) return;
document.getElementById('video-bg').play().catch(()=>{});
unlocked=true;
}

// YT PLAYER
function onYouTubeIframeAPIReady(){
yt=new YT.Player('player',{
events:{
onReady:e=>e.target.setVolume(20),
onStateChange:e=>{
if(e.data==1){
document.getElementById('track-name').innerText=yt.getVideoData().title;
document.getElementById('play').innerText='⏸';
startProgress();
}else{
document.getElementById('play').innerText='▶';
}
if(e.data==0){
loopOn?yt.playVideo():yt.nextVideo();
}
}
}
});
}

// PROGRESS
function startProgress(){
clearInterval(interval);
interval=setInterval(()=>{
if(!yt) return;
seek.max=yt.getDuration();
seek.value=yt.getCurrentTime();
},500);
}

// EXTRACT ID
function extract(u){
let m=u.match(/(?:v=|youtu\.be\/)([^&]+)/);
return m?m[1]:null;
}

// ADD SONG FUNCTION
function addSong(url){
let id=extract(url);
if(!id) return alert("Invalid YouTube URL");
thumb(id);
yt.loadVideoById(id);
setTimeout(()=>yt.playVideo(),200);

// ADD TO GRID
let c=document.createElement('div');
c.className='card';
c.onclick=()=>{
yt.loadVideoById(id);
thumb(id);
setTimeout(()=>yt.playVideo(),200);
};
c.innerHTML=`<img src="https://img.youtube.com/vi/${id}/mqdefault.jpg"><div class="card-info">${url}</div>`;
grid.prepend(c);
}

// THUMB
function thumb(id){document.getElementById('track-art').src=`https://img.youtube.com/vi/${id}/mqdefault.jpg`;}

// SEARCH BUTTON (for +ADD)
document.getElementById('addBtn').onclick=()=>addSong(document.getElementById('search').value);

// PLAY BUTTON
function toggle(){
if(!yt) return;
let state=yt.getPlayerState();
if(state===1){yt.pauseVideo();}else{
yt.playVideo();
setTimeout(()=>{if(yt.getPlayerState()!==1) yt.playVideo();},300);
}
}

// CONTROLS
function next(){yt.nextVideo();}
function prev(){yt.previousVideo();}
function loop(){loopOn=!loopOn;}

// SEEK
seek.oninput=()=>yt.seekTo(seek.value,true);

// VOLUME
vol.oninput=()=>{
let v=vol.value;
v-val.innerText=v;
clearTimeout(volTimer);
volTimer=setTimeout(()=>yt.setVolume(v),80);
};
vol.onchange=()=>yt.setVolume(vol.value);
</script>

</body>
</html>
