<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Aether Mobile</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root { --accent:#ff0033; }

* { -webkit-tap-highlight-color: transparent; }

body,html{
margin:0;
height:100%;
font-family:'Inter',sans-serif;
color:white;
overflow:hidden;
}

/* VIDEO */
#video-bg{
position:fixed;
inset:0;
width:100%;
height:100%;
object-fit:cover;
filter:brightness(0.5);
z-index:-1;
}

/* SEARCH */
header{padding:10px;}
.search-bar{
width:100%;
padding:14px;
border-radius:12px;
border:none;
font-size:16px;
background:rgba(0,0,0,0.6);
color:white;
}

/* GRID */
.grid{
position:absolute;
top:70px;
bottom:190px;
left:10px;
right:10px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
overflow-y:auto;
}

.card{
background:rgba(0,0,0,0.5);
border-radius:10px;
overflow:hidden;
}
.card img{width:100%;}
.card-info{padding:6px;font-size:12px;}

/* PLAYER HUD */
footer{
position:fixed;
bottom:0;
width:100%;
background:rgba(0,0,0,0.85);
padding:12px;
display:flex;
flex-direction:column;
gap:10px;
backdrop-filter:blur(20px);
}

/* TRACK */
.track{
display:flex;
align-items:center;
gap:10px;
}
#track-art{
width:48px;height:48px;border-radius:6px;
}
#track-name{
font-size:14px;
font-weight:700;
overflow:hidden;
white-space:nowrap;
text-overflow:ellipsis;
}

/* SEEK */
#seek{
width:100%;
height:4px;
}

/* CONTROLS */
.controls{
display:flex;
justify-content:center;
align-items:center;
gap:30px;
}
.controls button{
background:none;
border:none;
color:white;
font-size:22px;
padding:8px;
}
.play{font-size:32px;}

/* BOTTOM ROW */
.bottom-row{
display:flex;
justify-content:space-between;
align-items:center;
}

/* LOOP */
#loop-btn{
font-size:18px;
opacity:.7;
}

/* VOLUME */
.vol{
display:flex;
align-items:center;
gap:8px;
}
#v-val{
width:30px;
text-align:right;
color:var(--accent);
font-weight:bold;
}
#vol{
width:120px;
}
</style>
</head>

<body onclick="unlock()">

<video autoplay muted loop playsinline id="video-bg">
<source src="Akatsuki.mp4" type="video/mp4">
</video>

<header>
<input class="search-bar" id="search" placeholder="Search or paste URL"
onkeydown="if(event.key==='Enter') start(this.value)">
</header>

<div class="grid" id="grid"></div>

<footer>

<div class="track">
<img id="track-art">
<div id="track-name">Aether</div>
</div>

<input id="seek" type="range" value="0">

<div class="controls">
<button onclick="prev()">⏮</button>
<button class="play" id="play" onclick="toggle()">▶</button>
<button onclick="next()">⏭</button>
</div>

<div class="bottom-row">
<button id="loop-btn" onclick="loop()">🔁</button>

<div class="vol">
<span id="v-val">20</span>
<input id="vol" type="range" min="0" max="100" value="20">
</div>
</div>

</footer>

<div id="player" style="display:none;"></div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
let yt, loopOn=false, unlocked=false, interval, volTimer;

// unlock autoplay
function unlock(){
if(unlocked)return;
document.getElementById('video-bg').play().catch(()=>{});
if(yt)yt.playVideo();
unlocked=true;
}

// youtube
function onYouTubeIframeAPIReady(){
yt=new YT.Player('player',{
events:{
onReady:e=>e.target.setVolume(20),
onStateChange:e=>{
if(e.data==1){
track-name.innerText=yt.getVideoData().title;
play.innerText='⏸';
startProgress();
}else{
play.innerText='▶';
}
if(e.data==0){
loopOn?yt.playVideo():yt.nextVideo();
}
}
}
});
}

// progress
function startProgress(){
clearInterval(interval);
interval=setInterval(()=>{
if(!yt)return;
seek.max=yt.getDuration();
seek.value=yt.getCurrentTime();
},500);
}

// start
function start(v){
if(!yt)return;
let id=extract(v);
if(id){
yt.loadVideoById(id);
thumb(id);
}else search(v);
}

// extract
function extract(u){
let m=u.match(/(?:v=|youtu.be\/)([^&]+)/);
return m?m[1]:null;
}

// thumb
function thumb(id){
track-art.src=`https://img.youtube.com/vi/${id}/mqdefault.jpg`;
}

// search
async function search(q){
try{
let r=await fetch(`https://pipedapi.kavin.rocks/search?q=${q}`);
let d=await r.json();
grid.innerHTML='';
d.items.slice(0,10).forEach(i=>{
let id=extract(i.url);
if(!id)return;
let c=document.createElement('div');
c.className='card';
c.onclick=()=>{yt.loadVideoById(id);thumb(id);}
c.innerHTML=`<img src="${i.thumbnail}"><div class="card-info">${i.title}</div>`;
grid.appendChild(c);
});
}catch{}
}

// controls
function toggle(){
yt.getPlayerState()==1?yt.pauseVideo():yt.playVideo();
}
function next(){yt.nextVideo();}
function prev(){yt.previousVideo();}
function loop(){loopOn=!loopOn;}

// seek
seek.oninput=()=>yt.seekTo(seek.value,true);

// PERFECT MOBILE VOLUME
vol.oninput=()=>{
let v=vol.value;
v-val.innerText=v;

clearTimeout(volTimer);
volTimer=setTimeout(()=>yt.setVolume(v),80);
};
vol.onchange=()=>yt.setVolume(vol.value);
</script>

</body>
</html>
